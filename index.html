<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Distribuidora Pachitas</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(#ffcc00, #ff6600);
    margin: 0;
}

h1 {
    color: #b30000;
    margin-top: 10px;
}

input {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
}

canvas {
    width: 90vw;
    max-width: 400px;
    height: 90vw;
    max-height: 400px;
    background: white;
    border-radius: 50%;
    margin-top: 10px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    margin-top: 15px;
    background: green;
    color: white;
    border: none;
    border-radius: 8px;
}

.flecha {
    font-size: 40px;
    margin-top: -10px;
}

#resultado {
    font-size: 26px;
    font-weight: bold;
    margin-top: 15px;
    color: #b30000;
}

#pantallaFinal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    color: white;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-size: 30px;
}

#pantallaFinal button {
    background: #25D366;
}
</style>
</head>

<body>

<h1>🔥 Distribuidora Pachitas 🔥</h1>
<p><b>El más confiable y seguro</b></p>

<input type="text" id="cliente" placeholder="Nombre del cliente">

<div class="flecha">🔻</div>

<canvas id="ruleta"></canvas>

<br>
<button onclick="girar()">GIRAR</button>

<div id="resultado"></div>

<div id="pantallaFinal">
    <div id="mensajeFinal"></div>
    <br>
    <a id="whatsappBtn" target="_blank">
        <button>📲 Pedir por WhatsApp</button>
    </a>
</div>

<audio id="sonido" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
const opciones = ["S/2", "S/3", "GRACIAS", "S/2", "GRACIAS", "S/3"];
const colores = ["#ff4d4d","#ffd11a","#66cc66","#ff4d4d","#66cc66","#ffd11a"];

const canvas = document.getElementById("ruleta");
const ctx = canvas.getContext("2d");

let anguloActual = 0;
let girando = false;

function ajustarCanvas() {
    let size = Math.min(window.innerWidth * 0.9, 400);
    canvas.width = size;
    canvas.height = size;
}
window.addEventListener("resize", ajustarCanvas);
ajustarCanvas();

function dibujar() {
    let centro = canvas.width / 2;
    let angulo = 2 * Math.PI / opciones.length;

    for (let i = 0; i < opciones.length; i++) {
        ctx.beginPath();
        ctx.moveTo(centro, centro);
        ctx.arc(centro, centro, centro, anguloActual + i*angulo, anguloActual + (i+1)*angulo);
        ctx.fillStyle = colores[i];
        ctx.fill();

        ctx.save();
        ctx.translate(centro, centro);
        ctx.rotate(anguloActual + i*angulo + angulo/2);
        ctx.fillStyle = "black";
        ctx.fillText(opciones[i], centro/2, 5);
        ctx.restore();
    }
}

function girar() {
    if (girando) return;

    let nombre = document.getElementById("cliente").value;
    if (nombre === "") {
        alert("Ingrese nombre");
        return;
    }

    girando = true;

    let vueltas = Math.random() * 5 + 5;
    let duracion = 3500;
    let inicio = null;

    function animar(tiempo) {
        if (!inicio) inicio = tiempo;
        let progreso = tiempo - inicio;

        let velocidad = (vueltas * 2 * Math.PI) * (1 - progreso/duracion);
        anguloActual += velocidad * 0.02;

        ctx.clearRect(0,0,canvas.width,canvas.height);
        dibujar();

        if (progreso < duracion) {
            requestAnimationFrame(animar);
        } else {
            terminar(nombre);
        }
    }

    requestAnimationFrame(animar);
}

function terminar(nombre) {
    girando = false;

    let angulo = 2 * Math.PI / opciones.length;
    let indice = Math.floor(((2*Math.PI - anguloActual % (2*Math.PI)) / angulo)) % opciones.length;

    let premio = opciones[indice];

    document.getElementById("sonido").play();

    document.getElementById("pantallaFinal").style.display = "flex";
    document.getElementById("mensajeFinal").innerHTML =
        "🎉 " + nombre + "<br>GANASTE: " + premio;

    let numero = "51999999999"; // CAMBIA TU NUMERO
    let mensaje = `Hola, soy ${nombre}. Gané ${premio} y quiero mi gas`;

    document.getElementById("whatsappBtn").href =
        "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);
}

dibujar();
</script>

</body>
</html>
