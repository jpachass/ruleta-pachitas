<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Distribuidora Pachitas</title>

<style>
    canvas {
    width: 90vw;   /* ocupa 90% del ancho del celular */
    max-width: 400px;
    height: 90vw;
    max-height: 400px;
    background: white;
    border-radius: 50%;
}
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(#ffcc00, #ff6600);
}
h1 { color: #b30000; }

canvas {
    background: white;
    border-radius: 50%;
    margin-top: 10px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    margin-top: 10px;
    background: green;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#resultado {
    font-size: 28px;
    margin-top: 15px;
    font-weight: bold;
    color: #b30000;
}

input {
    padding: 10px;
    font-size: 16px;
    width: 200px;
}
</style>
</head>

<body>

<h1>🔥 Distribuidora Pachitas 🔥</h1>
<p><b>El más confiable y seguro</b></p>

<input type="text" id="cliente" placeholder="Nombre del cliente">

<br>

<canvas id="ruleta"></canvas>

<br>
<button onclick="girar()">GIRAR</button>

<div id="resultado"></div>

<audio id="sonido" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
const opciones = ["S/2", "S/3", "GRACIAS", "S/2", "GRACIAS", "S/3"];
const colores = ["#ff4d4d","#ffd11a","#66cc66","#ff4d4d","#66cc66","#ffd11a"];

const canvas = document.getElementById("ruleta");
const ctx = canvas.getContext("2d");
    function ajustarCanvas() {
    let size = Math.min(window.innerWidth * 0.9, 400);
    canvas.width = size;
    canvas.height = size;
}

window.addEventListener("resize", ajustarCanvas);
ajustarCanvas();

let anguloActual = 0;
let girando = false;

function dibujar() {
    let angulo = 2 * Math.PI / opciones.length;

    for (let i = 0; i < opciones.length; i++) {
        ctx.beginPath();
        ctx.moveTo(ctx.moveTo(let centro = canvas.width / 2;,1let centro = canvas.width / 2;60);,ctx.moveTo(160,160););
        ctx.arc(let centro = canvas.width / 2;,let centro = canvas.width / 2;,let centro = canvas.width / 2;, anguloActual + i*angulo, anguloActual + (i+1)*angulo);
        ctx.fillStyle = colores[i];
        ctx.fill();

        ctx.save();
        ctx.translate(160,160);
        ctx.rotate(anguloActual + i*angulo + angulo/2);
        ctx.fillStyle = "black";
        ctx.fillText(opciones[i], 80, 5);
        ctx.restore();
    }
}

function girar() {
    if (girando) return;

    let nombre = document.getElementById("cliente").value;
    if (nombre === "") {
        alert("Ingrese nombre del cliente");
        return;
    }

    girando = true;
    document.getElementById("resultado").innerHTML = "";

    let vueltas = Math.random() * 5 + 5;
    let duracion = 3000;
    let inicio = null;

    function animar(tiempo) {
        if (!inicio) inicio = tiempo;
        let progreso = tiempo - inicio;

        let velocidad = (vueltas * 2 * Math.PI) * (1 - progreso/duracion);
        anguloActual += velocidad * 0.02;

        ctx.clearRect(0,0,320,320);
        dibujar();

        if (progreso < duracion) {
            requestAnimationFrame(animar);
        } else {
            terminar(nombre);
        }
    }

    requestAnimationFrame(animar);
}

function terminar(nombre) {
    girando = false;

    let angulo = 2 * Math.PI / opciones.length;
    let indice = Math.floor(((2*Math.PI - anguloActual % (2*Math.PI)) / angulo)) % opciones.length;

    let premio = opciones[indice];

    document.getElementById("resultado").innerHTML =
        "🎉 " + nombre + " GANÓ: " + premio;

    document.getElementById("sonido").play();

    guardar(nombre, premio);
}

function guardar(nombre, premio) {
    let historial = JSON.parse(localStorage.getItem("clientes")) || [];
    historial.push({nombre, premio});
    localStorage.setItem("clientes", JSON.stringify(historial));
}
dibujar();
</script>

</body>
</html>
