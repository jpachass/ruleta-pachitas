    position: fixed;

.confeti {
    position: fixed;
    width:10px;
    height:10px;
    background:red;
    top:0;
    animation: caer 3s linear forwards;

@keyframes caer {
    to { transform: translateY(100vh) rotate(720deg); }

<svg width="40" height="40" viewBox="0 0 64 64">

</svg>
</h1>

<p>🎁 GIRA LA RULETA Y GANA TU DESCUENTO 🎁</p>

<input id="cliente" placeholder="INGRESA TU NOMBRE" 
style="
    text-transform: uppercase; 
    width: 80%;
    max-width: 350px;
    padding: 15px;
    font-size: 20px;
    text-align: center;
    border-radius: 12px;
    border: 2px solid #ccc;
    outline: none;
    transition: 0.3s;
"
onfocus="this.style.borderColor='green'; this.style.boxShadow='0 0 10px rgba(0,255,0,0.5)'"
onblur="this.style.borderColor='#ccc'; this.style.boxShadow='none'"
>
<div class="flecha">🔻</div>
<canvas id="ruleta"></canvas>
<br>
<button onclick="girar()">GIRAR</button>
<br><br>
<button onclick="resetearClientes()" 
style="background:red;">
🗑️ Resetear clientes
</button>
<button onclick="verRegistros()" style="margin-top:10px;">
📊 Ver registros
</button>
<p>🎉🎉 GRACIAS POR ELEGIRNOS 🎉🎉</p>
<div id="pantallaFinal">
    <div id="mensajeFinal"></div>
    <button onclick="cerrar()">Cerrar</button>
</div>
<audio id="sonido" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<script>
// VALIDACIÓN DEL NOMBRE
document.getElementById("cliente").addEventListener("input", function() {
    this.value = this.value.toUpperCase();
    this.value = this.value.replace(/[^A-Z\s]/g, '');
}); 

const opciones = ["S/2.00","S/3.00","S/2.50","S/2.00","S/2.50","S/3.00"];
const colores = ["#ff4d4d","#ffd11a","#66cc66","#ff4d4d","#66cc66","#ffd11a"];

const canvas = document.getElementById("ruleta");
const ctx = canvas.getContext("2d");

let anguloActual = 0;
let girando = false;

function ajustarCanvas(){
    let size = Math.min(window.innerWidth * 0.9, 420);
    canvas.width = size;
    canvas.height = size;
    dibujar();
}
window.addEventListener("resize", ajustarCanvas);

function dibujar(){
    let c = canvas.width/2;
    let r = c-5;
    let ang = 2*Math.PI/opciones.length;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let i=0;i<opciones.length;i++){
        ctx.beginPath();
        ctx.moveTo(c,c);
        ctx.arc(c,c,r,anguloActual+i*ang,anguloActual+(i+1)*ang);
        ctx.fillStyle=colores[i];
        ctx.fill();

        ctx.save();
        ctx.translate(c,c);
        ctx.rotate(anguloActual+i*ang+ang/2);
        ctx.fillStyle="black";
        ctx.font=`${c/8}px Arial`;
        ctx.textAlign="right";
        ctx.fillText(opciones[i], r-10,5);
        ctx.restore();
    }
}
function girar(){
    if(girando)return;

    let nombre=document.getElementById("cliente").value;
    if(nombre===""){ alert("Ingrese nombre"); return; }

    girando=true;

    let vueltas=Math.random()*5+5;
    let duracion=3500;
    let inicio=null;

    function animar(t){
        if(!inicio) inicio=t;
        let progreso=t-inicio;

        let ease=1-Math.pow(1-progreso/duracion,3);
        let velocidad=(vueltas*2*Math.PI)*(1-ease);

        anguloActual+=velocidad*0.02;
        dibujar();
        if(progreso<duracion){
            requestAnimationFrame(animar);
        } else {
            terminar(nombre);
        }
    }
    requestAnimationFrame(animar);
}

function terminar(nombre){
    girando=false;

    let angulo = 2 * Math.PI / opciones.length;
    let anguloCorregido = (anguloActual + Math.PI / 2) % (2 * Math.PI);
    let i = Math.floor((2 * Math.PI - anguloCorregido) / angulo) % opciones.length;

    let premio=opciones[i];

    document.getElementById("sonido").play();
    document.getElementById("pantallaFinal").style.display="flex";
    document.getElementById("mensajeFinal").innerHTML =
    "🎉 FELICIDADES " + nombre + "<br><br>🎁 GANASTE " + premio + " DE DESCUENTO EN TU PRÓXIMA COMPRA";
    
    // Guardar registro
    let registros = JSON.parse(localStorage.getItem("clientesPachitas")) || [];
    registros.push({
        nombre: nombre,
        premio: premio,
        fecha: new Date().toLocaleString()
    });
    localStorage.setItem("clientesPachitas", JSON.stringify(registros));
    lanzarConfeti();
}
function cerrar(){
    document.getElementById("pantallaFinal").style.display="none";
}

// CONFETI
function lanzarConfeti(){
    for(let i=0;i<50;i++){
        let confeti=document.createElement("div");
        confeti.className="confeti";
        confeti.style.left=Math.random()*100+"vw";
        confeti.style.backgroundColor=
            ["red","yellow","green","blue"][Math.floor(Math.random()*4)];
        confeti.style.animationDuration=(Math.random()*2+2)+"s";
        document.body.appendChild(confeti);

        setTimeout(()=>confeti.remove(),3000);
    }
}
